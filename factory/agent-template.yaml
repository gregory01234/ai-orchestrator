apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{AGENT_NAME}}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{AGENT_NAME}}
  template:
    metadata:
      labels:
        app: {{AGENT_NAME}}
    spec:
      containers:
        - name: agent
          image: alpine:latest
          command: ["sh", "-c", "echo {{AGENT_NAME}} running && sleep 3600"]
